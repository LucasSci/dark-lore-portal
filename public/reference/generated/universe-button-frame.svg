<svg width="420" height="88" viewBox="0 0 420 88" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="agedGoldFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ECC965"/>
      <stop offset="50%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#A18858"/>
    </linearGradient>
    <linearGradient id="agedGoldStroke" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37"/>
      <stop offset="50%" stop-color="#A18858"/>
      <stop offset="100%" stop-color="#8A734D"/>
    </linearGradient>
    <linearGradient id="agedGoldHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFAD5"/>
      <stop offset="50%" stop-color="#ECC965"/>
      <stop offset="100%" stop-color="#D4AF37"/>
    </linearGradient>
  </defs>

  <!-- Central Plaque - Outer Border -->
  <path d="M50 14 C46.6863 14 44 16.6863 44 20 V68 C44 71.3137 46.6863 74 50 74 H370 C373.314 74 376 71.3137 376 68 V20 C376 16.6863 373.314 14 370 14 H50 Z" stroke="url(#agedGoldStroke)" stroke-width="2" fill="none"/>

  <!-- Central Plaque - Inner Highlight -->
  <path d="M52 16 C49.7909 16 48 17.7909 48 20 V68 C48 70.2091 49.7909 72 52 72 H368 C370.209 72 372 70.2091 372 68 V20 C372 17.7909 370.209 16 368 16 H52 Z" stroke="url(#agedGoldHighlight)" stroke-width="1" fill="none"/>

  <!-- Left Ornamentation -->
  <g>
    <!-- Main horizontal line from plaque edge -->
    <path d="M 50 44 H 10" stroke="url(#agedGoldStroke)" stroke-width="2" fill="none"/>
    <!-- Upper flourish -->
    <path d="M 50 44 C 40 38 30 30 10 30 C 5 30 0 34 0 38" stroke="url(#agedGoldStroke)" stroke-width="1.5" fill="none"/>
    <!-- Lower flourish -->
    <path d="M 50 44 C 40 50 30 58 10 58 C 5 58 0 54 0 50" stroke="url(#agedGoldStroke)" stroke-width="1.5" fill="none"/>
    <!-- Small central gem at the end of the main line -->
    <circle cx="10" cy="44" r="3" fill="url(#agedGoldFill)"/>
    <!-- "Ritual corner" details extending from the ends of flourishes -->
    <path d="M 0 38 L 5 40 M 0 50 L 5 48" stroke="url(#agedGoldStroke)" stroke-width="1" fill="none"/>
  </g>

  <!-- Right Ornamentation (Mirrored from Left) -->
  <g transform="translate(420, 0) scale(-1, 1)">
    <!-- Main horizontal line from plaque edge -->
    <path d="M 50 44 H 10" stroke="url(#agedGoldStroke)" stroke-width="2" fill="none"/>
    <!-- Upper flourish -->
    <path d="M 50 44 C 40 38 30 30 10 30 C 5 30 0 34 0 38" stroke="url(#agedGoldStroke)" stroke-width="1.5" fill="none"/>
    <!-- Lower flourish -->
    <path d="M 50 44 C 40 50 30 58 10 58 C 5 58 0 54 0 50" stroke="url(#agedGoldStroke)" stroke-width="1.5" fill="none"/>
    <!-- Small central gem at the end of the main line -->
    <circle cx="10" cy="44" r="3" fill="url(#agedGoldFill)"/>
    <!-- "Ritual corner" details extending from the ends of flourishes -->
    <path d="M 0 38 L 5 40 M 0 50 L 5 48" stroke="url(#agedGoldStroke)" stroke-width="1" fill="none"/>
  </g>

  <!-- Top Center Detail -->
  <g>
    <path d="M 210 14 V 5 M 205 9 L 210 5 L 215 9" stroke="url(#agedGoldStroke)" stroke-width="1.5" fill="none"/>
    <circle cx="210" cy="9" r="2" fill="url(#agedGoldFill)"/>
  </g>

  <!-- Bottom Center Detail -->
  <g>
    <path d="M 210 74 V 83 M 205 79 L 210 83 L 215 79" stroke="url(#agedGoldStroke)" stroke-width="1.5" fill="none"/>
    <circle cx="210" cy="79" r="2" fill="url(#agedGoldFill)"/>
  </g>

</svg>